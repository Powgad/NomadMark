plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.editor.nomadmark'
    compileSdk 34

    defaultConfig {
        applicationId "com.editor.nomadmark"
        minSdk 28  // Supernote A6 X2 Nomad compatibility
        targetSdk 34
        versionCode 1
        versionName "1.0.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }
    }

    configurations {
        all {
            resolutionStrategy {
                // 强制使用单一版本的 annotations
                force 'org.jetbrains:annotations:23.0.0'
            }
            // 排除 annotations-java5
            exclude group: 'org.jetbrains', module: 'annotations-java5'
        }
    }

    signingConfigs {
        release {
            storeFile file("ratta.jks")
            storePassword '34537701'
            keyAlias 'ratta'
            keyPassword '34537701'
        }

        debug {
            storeFile file("ratta.jks")
            storePassword '34537701'
            keyAlias 'ratta'
            keyPassword '34537701'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }

        debug {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug
        }
    }

    // APK 输出文件名配置
    android.applicationVariants.all { variant ->
        variant.outputs.all {
            outputFileName = "NomadMark-${variant.name}-${variant.versionName}.apk"
        }
    }

    // 支持 aar 包的 flatDir 配置
    repositories {
        flatDir {
            dirs 'libs'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    // AndroidX
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'

    // Material Design
    implementation 'com.google.android.material:material:1.11.0'

    // Coroutines
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'

    // Markwon - Markdown rendering engine with full feature support
    def markwonVersion = '4.6.2'
    implementation "io.noties.markwon:core:$markwonVersion"
    implementation "io.noties.markwon:ext-strikethrough:$markwonVersion"
    implementation "io.noties.markwon:ext-tables:$markwonVersion"
    implementation "io.noties.markwon:ext-tasklist:$markwonVersion"
    implementation "io.noties.markwon:image:$markwonVersion"
    implementation "io.noties.markwon:inline-parser:$markwonVersion"
    // Markwon Coil 集成（用于图片加载）
    implementation "io.noties.markwon:image-coil:$markwonVersion"
    // 注意：Markwon 4.6.2 的 image-glide 模块可能不可用
    // 默认 ImagesPlugin 支持本地文件 (file:// 协议)

    // 数学公式渲染 (使用 JLatexMath)
    implementation "io.noties.markwon:ext-latex:$markwonVersion"
    implementation "ru.noties:jlatexmath-android:0.2.0"

    // 代码语法高亮 - 暂时禁用（需要额外配置 Prism4j）
    // TODO: 后续可添加 syntax-highlight 和 prism4j 支持
    // implementation "io.noties.markwon:syntax-highlight:$markwonVersion"

    // ============================================
    // Supernote AAR 库 (如果有的话)
    // ============================================
    // 将以下 aar 文件放入 app/libs/ 目录后，取消注释相应依赖：
    //
    // api(name: 'SupernoteUiLib', ext: 'aar') { transitive true }
    // api(name: 'dialoglib', ext: 'aar') { transitive true }
    // api(name: 'nativeEventlib', ext: 'aar') { transitive true }

    // EventBus (Supernote 库可能需要)
    implementation 'org.greenrobot:eventbus:3.3.1'

    // Glide (Supernote 库可能需要)
    implementation 'com.github.bumptech.glide:glide:4.7.1'

    // Coil - 轻量级图片加载库（用于 Markwon 图片渲染）
    def coilVersion = '2.5.0'
    implementation "io.coil-kt:coil:$coilVersion"
    // implementation "io.coil-kt:coil-svg:$coilVersion"  // 与 AndroidSVG 冲突，移除
    implementation "io.coil-kt:coil-gif:$coilVersion"

    // WiFi 打印支持 (可选)
    implementation 'androidx.print:print:1.0.0'

    // AndroidSVG - SVG 渲染库（用于乐谱渲染）
    implementation 'com.caverock:androidsvg:1.4'

    // Testing
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
