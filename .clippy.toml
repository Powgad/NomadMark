# Clippy configuration for NomadMark
# https://rust-lang.github.io/rust-clippy/clippy_lints/configuration.html

# Complexity thresholds
cognitive-complexity-threshold = 30
type-complexity-threshold = 250

# Documentation
missing-docs-in-private-items = false

# Performance
too-many-arguments-threshold = 7

# Allowed lints (suppress warnings)
# too-many-arguments = "allow"  # FFI functions may have many arguments
# dead-code = "allow"  # Allow unused code during development
