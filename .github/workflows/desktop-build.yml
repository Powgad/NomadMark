# NomadMark Desktop Build
#
# Desktop 平台构建工作流 (Tauri)
# 触发条件: push 到 main/develop 分支，或手动触发

name: Desktop Build

on:
  push:
    branches: [main, develop]
    paths:
      - 'core/**'
      - 'platforms/desktop/**'
      - '.github/workflows/desktop-build.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'core/**'
      - 'platforms/desktop/**'
  workflow_dispatch:
    inputs:
      target:
        description: '目标平台'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - macos
          - linux

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================================
  # 依赖检查和代码格式化验证
  # ============================================================================
  check:
    name: Code Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: 🔍 检查 TypeScript 类型
        run: |
          cd platforms/desktop/src
          if [ -f "../package.json" ]; then
            npm ci
            npm run tsc --noEmit || true
          fi
        continue-on-error: true

      - name: 🎨 检查代码格式
        run: |
          cd platforms/desktop
          if [ -f "package.json" ]; then
            npm ci
            npm run format:check || true
          fi
        continue-on-error: true

  # ============================================================================
  # Windows 构建
  # ============================================================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    if: github.event.inputs.target != 'macos' && github.event.inputs.target != 'linux'

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: 🦀 安装 Rust 工具链
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: 💾 配置 Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            core
            platforms/desktop/src-tauri

      - name: 📦 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: platforms/desktop/package-lock.json

      - name: 📥 安装前端依赖
        run: |
          cd platforms/desktop
          npm ci

      - name: 🔨 构建 Tauri 应用
        run: |
          cd platforms/desktop
          npm run tauri build

      - name: 📤 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: nomadmark-windows
          path: |
            platforms/desktop/src-tauri/target/release/bundle/nsis/NomadMark_*.exe
            platforms/desktop/src-tauri/target/release/bundle/msi/NomadMark_*.msi
          retention-days: 14
          if-no-files-found: warn

  # ============================================================================
  # macOS 构建
  # ============================================================================
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    if: github.event.inputs.target != 'windows' && github.event.inputs.target != 'linux'

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: 🦀 安装 Rust 工具链
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: 💾 配置 Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            core
            platforms/desktop/src-tauri

      - name: 📦 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: platforms/desktop/package-lock.json

      - name: 📥 安装前端依赖
        run: |
          cd platforms/desktop
          npm ci

      - name: 🔨 构建 Tauri 应用
        run: |
          cd platforms/desktop
          npm run tauri build

      - name: 📤 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: nomadmark-macos
          path: |
            platforms/desktop/src-tauri/target/release/bundle/dmg/NomadMark_*.dmg
            platforms/desktop/src-tauri/target/release/bundle/macos/NomadMark.app
          retention-days: 14
          if-no-files-found: warn

      - name: 🍎 代码签名（如果配置）
        if: false
        env:
          APPLE_CERT: ${{ secrets.APPLE_CERT }}
          APPLE_CERT_PASS: ${{ secrets.APPLE_CERT_PASS }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # 代码签名配置需要额外的设置
          echo "macOS 代码签名需要手动配置"

  # ============================================================================
  # Linux 构建
  # ============================================================================
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    if: github.event.inputs.target != 'windows' && github.event.inputs.target != 'macos'

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: 🦀 安装 Rust 工具链
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: 💾 配置 Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            core
            platforms/desktop/src-tauri

      - name: 📦 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: 📦 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: platforms/desktop/package-lock.json

      - name: 📥 安装前端依赖
        run: |
          cd platforms/desktop
          npm ci

      - name: 🔨 构建 Tauri 应用
        run: |
          cd platforms/desktop
          npm run tauri build

      - name: 📤 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: nomadmark-linux
          path: |
            platforms/desktop/src-tauri/target/release/bundle/deb/nomadmark_*.deb
            platforms/desktop/src-tauri/target/release/bundle/appimage/nomadmark_*.AppImage
          retention-days: 14
          if-no-files-found: warn

  # ============================================================================
  # 发布到 GitHub Releases
  # ============================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: 📦 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 🏷️ 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
